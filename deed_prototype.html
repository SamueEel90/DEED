<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DEED — testovací prototyp</title>
<style>
:root{
  --bg:#0B0C0F; --surface:#13151A; --surface2:#15171C; --line:#26282E; --line2:#1F2228;
  --txt:#E9EAEC; --txt2:#9AA0A8; --txt3:#7E848C;
  --blue:#5BA8F0; --blueBg:#13243a; --blueBd:#2A5E8E;
  --green:#3DD68C; --greenBg:#0f2417; --greenBd:#2E7D52;
  --teal:#3DD6CE; --tealBg:#0d2422; --tealBd:#2E9E9E;
  --purple:#A98BF0; --purpleBg:#1a1430; --purpleBd:#7A5BD8;
  --red:#F2706F; --redBg:#2a1414; --redBd:#7A3030;
  --gold:#E7C766; --goldBg:#2A1F10;
  --orange:#F0A85E;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{background:#000;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--txt)}
#app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;overflow:hidden}
.screen{display:none;padding-bottom:84px}
.screen.active{display:block;animation:fade .18s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
.muted{color:var(--txt2)} .small{font-size:12px;color:var(--txt3)}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 10px}
.hdr .logo{font-size:20px;font-weight:800}
.hdr .logo span{color:var(--blue)}
.hdr .left{display:flex;align-items:center;gap:14px}
.burger{font-size:22px;color:#C8CCD2;cursor:pointer;line-height:1}
.me{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.avatar{width:38px;height:38px;border-radius:50%;background:#3A8DD6;border:2px solid var(--blue);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px}
.karma-mini{font-size:10px;font-weight:700;color:var(--gold)}

/* SECTIONS */
.sections{display:flex;gap:8px;padding:6px 16px 12px}
.sec{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;height:44px;border-radius:13px;background:var(--surface2);border:1px solid var(--line);font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.sec:active{transform:scale(.97)}
.sec.primary{background:var(--blueBg);border-color:var(--blueBd);color:#cfe6fb}
.sec .ic{font-size:15px}

/* LEADERS */
.leaders{display:flex;gap:6px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none}
.leaders::-webkit-scrollbar{display:none}
.lead{min-width:72px;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.lead .sym{width:30px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.lead .role{font-size:7px;letter-spacing:.4px;color:var(--txt3);font-weight:700}
.lead .nm{font-size:9.5px;font-weight:700}
.divider-v{width:1px;background:var(--line);margin:4px 2px}
.friend{min-width:52px;display:flex;flex-direction:column;align-items:center;gap:3px}
.friend .fc{width:40px;height:40px;border-radius:50%;background:#16181D;border:2px solid var(--blue);display:flex;align-items:center;justify-content:center;font-size:13px;color:#C8CCD2}
.friend .fn{font-size:9px;color:var(--txt2)}

/* TICKER + RADIUS */
.ticker{margin:0 16px 8px;background:var(--surface2);border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:10px;font-size:11px;color:var(--txt2)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex:none}
.radius{display:flex;justify-content:space-between;align-items:center;padding:2px 18px 14px;font-size:12px;color:var(--txt3)}
.radius a{color:var(--blue);cursor:pointer}

/* FEED */
.feed{padding:0 16px}
.card{background:var(--surface2);border:1px solid var(--line);border-radius:16px;margin-bottom:12px;overflow:hidden;cursor:pointer;transition:.15s}
.card:active{transform:scale(.985)}

/* BIG */
.big .hero{height:148px;position:relative;display:flex;align-items:center;justify-content:center}
.hero-grad{position:absolute;inset:0}
.play{width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.play:after{content:"";border-left:16px solid #fff;border-top:10px solid transparent;border-bottom:10px solid transparent;margin-left:4px}
.badge{position:absolute;top:12px;font-size:10px;font-weight:700;padding:4px 9px;border-radius:7px;background:rgba(0,0,0,.6)}
.badge.l{left:12px;color:var(--gold)} .badge.r{right:12px;color:#fff;display:flex;align-items:center;gap:4px}
.chip{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:3px 9px;border-radius:7px}
.card .body{padding:14px}
.row-top{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.pfp{width:32px;height:32px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff}
.name{font-weight:700;font-size:13.5px}
.verif{font-size:9px;color:var(--green);background:var(--greenBg);padding:2px 7px;border-radius:7px}
.time{margin-left:auto;font-size:10px;color:var(--txt3)}
.loc{font-size:10.5px;color:var(--txt3);margin-left:42px;margin-bottom:8px}
.title{font-size:13px;font-weight:700;line-height:1.35}

/* MEDIUM */
.med{display:flex;padding:12px;gap:12px;align-items:flex-start}
.med .thumb{width:96px;height:80px;border-radius:11px;flex:none;display:flex;align-items:center;justify-content:center;font-size:26px}
.med .mright{flex:1;min-width:0}
.med .mt{font-size:12.5px;font-weight:700;line-height:1.3}
.med .mmeta{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}

/* REQUEST */
.req{border-color:var(--redBd);background:#1c1314}
.req .ricon{width:64px;height:64px;border-radius:11px;background:var(--redBg);border:1px solid var(--redBd);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:var(--red);flex:none}
.req .progress{height:6px;background:#2a1414;border-radius:3px;margin-top:8px;overflow:hidden}
.req .progress>i{display:block;height:100%;background:var(--red)}

/* CHARITY */
.char{border-color:var(--blueBd)}
.charbadge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;color:var(--gold);background:var(--goldBg);padding:2px 7px;border-radius:6px}

/* SMALL ROW */
.srow{display:flex;align-items:center;gap:12px;padding:10px 12px;background:#13151A;border:1px solid var(--line2);border-radius:12px;margin-bottom:8px;cursor:pointer}
.srow:active{transform:scale(.99)}
.srow .si{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex:none}
.srow .sb{flex:1;min-width:0}
.srow .st{font-size:11.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.srow .smeta{font-size:9.5px;color:var(--txt3);margin-top:2px}
.srow .sr{text-align:right;flex:none}
.cdot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:5px}

/* TABBAR */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:72px;background:#0B0C0F;border-top:1px solid #1B1D22;display:flex;align-items:center;z-index:50}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:var(--txt3);font-size:10.5px}
.tab .ti{font-size:19px;line-height:1}
.tab.active{color:var(--blue);font-weight:700}

/* DETAIL */
.detail-hero{height:150px;position:relative;display:flex;align-items:center;justify-content:center}
.dback{position:absolute;top:14px;left:14px;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;cursor:pointer;z-index:2}
.dmore{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;z-index:2}
.dwrap{padding:14px 18px}
.section-label{font-size:10px;letter-spacing:.5px;color:var(--txt3);font-weight:700;margin:18px 0 8px}
.free-row{display:flex;gap:10px}
.free-btn{flex:1;height:44px;border-radius:11px;background:var(--surface2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;gap:8px;font-weight:700;cursor:pointer;color:var(--txt);font-size:14px}
.free-btn:active{transform:scale(.97)}
.free-btn.liked{color:var(--red);border-color:var(--redBd)}
.fixed-row{display:flex;gap:8px;align-items:flex-end}
.fx{border-radius:10px;background:var(--surface2);border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--blue);font-weight:700}
.fx:active{animation:pop .25s}
.fx .e{font-size:17px} .fx .v{font-size:11px;margin-top:3px}
.fx.s1{width:52px;height:48px} .fx.s2{width:58px;height:56px} .fx.s3{width:64px;height:64px}
.sep{width:1px;align-self:stretch;border-left:1px dashed #3A3F47;margin:0 4px}
.fx.sms{width:62px;height:64px;background:#1A1410;border-color:#5A4A2A;color:var(--gold)}
.custom-row{display:flex;gap:10px}
.cbtn{flex:1;height:50px;border-radius:11px;background:var(--surface2);border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer}
.cbtn .ct{font-weight:700;font-size:13px} .cbtn .cs{font-size:8.5px;color:var(--txt3);margin-top:2px}
.qr-row{display:flex;align-items:center;gap:14px;background:var(--surface2);border:1px solid var(--line);border-radius:14px;padding:12px;margin-top:14px}
.qr-mini{width:52px;height:52px;border-radius:8px;background:#fff;flex:none;display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);gap:1px;padding:5px}
.qr-mini i{background:#0B0C0F;border-radius:1px}
.share-btn{margin-left:auto;background:var(--blueBg);border:1px solid var(--blueBd);color:#cfe6fb;font-weight:700;font-size:11px;padding:8px 14px;border-radius:9px;cursor:pointer}
.verify-row{display:flex;gap:12px;margin-top:14px}
.vbtn{flex:1;height:62px;border-radius:13px;display:flex;align-items:center;gap:10px;padding-left:16px;cursor:pointer;border:1px solid}
.vbtn:active{transform:scale(.98)}
.vbtn.ok{background:var(--greenBg);border-color:var(--greenBd)}
.vbtn.no{background:var(--redBg);border-color:var(--redBd)}
.vcirc{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
.vbtn.ok .vcirc{background:#143D2A;color:var(--green)} .vbtn.no .vcirc{background:#3D1A1A;color:var(--red)}
.vbtn .vt{font-weight:800;font-size:13px;line-height:1.1}
.vbtn.ok .vt{color:var(--green)} .vbtn.no .vt{color:var(--red)}
.vbtn .vs{font-size:9.5px;color:var(--txt3)}
.live-sum{text-align:center;padding:12px;background:var(--surface2);border:1px solid var(--blueBd);border-radius:12px;margin-top:6px}
.live-sum b{font-size:22px;color:var(--blue)}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a2b22;border:1px solid var(--greenBd);color:#cfeede;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;opacity:0;transition:.3s;z-index:100;pointer-events:none;text-align:center;max-width:90%}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* CELEBRATION */
.celebrate{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:16px}
.celebrate.show{display:flex;animation:fade .2s}
.mascot{width:120px;height:120px;border-radius:50%;background:var(--greenBg);border:3px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:54px;animation:pop .5s}
.celebrate h2{color:#fff;font-size:20px} .celebrate p{color:var(--txt2);font-size:14px;text-align:center;padding:0 30px}

/* ADD WIZARD */
.wizard{padding:18px}
.wizard h2{font-size:18px;margin-bottom:6px}
.choice{display:flex;gap:12px;margin-top:16px}
.choice .ch{flex:1;background:var(--surface2);border:1px solid var(--line);border-radius:16px;padding:24px 14px;text-align:center;cursor:pointer}
.choice .ch:active{transform:scale(.97)}
.choice .ch .ci{font-size:34px} .choice .ch .ct{font-weight:700;margin-top:10px} .choice .ch .cs{font-size:11px;color:var(--txt3);margin-top:4px}
textarea,input{width:100%;background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:14px;color:var(--txt);font-size:14px;font-family:inherit;resize:none;margin-top:8px}
.ai-box{background:var(--greenBg);border:1px solid var(--greenBd);border-radius:12px;padding:14px;margin-top:14px;font-size:13px;line-height:1.4}
.btn{width:100%;height:50px;border-radius:12px;background:var(--blueBg);border:1px solid var(--blueBd);color:#cfe6fb;font-weight:700;font-size:15px;cursor:pointer;margin-top:18px}
.btn:active{transform:scale(.98)}
.btn.green{background:var(--greenBg);border-color:var(--greenBd);color:#cfeede}
.media-row{display:flex;gap:10px;margin-top:8px}
.media-row .mslot{width:64px;height:64px;border:1px dashed var(--line);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#4A4F57;cursor:pointer}

/* PROFILE */
.pf-head{margin:8px 16px 0;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px;display:flex;gap:14px;align-items:center}
.pf-av{width:60px;height:60px;border-radius:50%;background:#3A8DD6;border:2px solid var(--blue);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700}
.pf-name{font-size:17px;font-weight:700}
.pf-karma{display:inline-flex;align-items:center;gap:5px;background:var(--goldBg);border:1px solid #C8A23A;color:var(--gold);font-size:10px;font-weight:700;padding:4px 9px;border-radius:9px;margin-top:6px}
.pf-mode{display:inline-flex;font-size:9.5px;color:var(--green);background:var(--greenBg);border:1px solid var(--greenBd);padding:3px 8px;border-radius:7px;margin-top:6px;margin-right:8px}
.pf-prog{margin:14px 16px 0}
.pf-prog .pbar{height:8px;background:#1F2731;border-radius:4px;overflow:hidden;margin-top:6px}
.pf-prog .pbar>i{display:block;height:100%;width:72%;background:var(--gold)}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:16px}
.tile{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;cursor:pointer}
.tile:active{transform:scale(.98)}
.tile .tic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700}
.tile .tt{font-weight:700;font-size:12.5px;margin-top:12px}
.tile .ts{font-size:9.5px;color:var(--txt3);margin-top:2px}

.back-bar{display:flex;align-items:center;gap:10px;padding:16px 18px 8px}
.back-bar .bk{width:30px;height:30px;border-radius:50%;background:var(--surface2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.back-bar h3{font-size:15px}
.sublist{padding:0 16px}
.subitem{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:8px;font-size:13px}
.subitem .amt{font-weight:700}
.note{padding:14px 18px;font-size:11px;color:var(--txt3);line-height:1.5}
</style>
</head>
<body>
<div id="app">
  <!-- HOME / FEED -->
  <div class="screen active" id="home">
    <div class="hdr">
      <div class="left"><span class="burger" onclick="toast('☰ Menu: 11 modulov + Mapa + nastavenia')">☰</span><div class="logo">DEED <span>Good</span></div></div>
      <div class="me" onclick="go('profile')"><div class="avatar">M</div><div class="karma-mini">Gold</div></div>
    </div>
    <div class="sections">
      <div class="sec" onclick="toast('Talent — TikTok kanál (demo)')"><span class="ic">▶</span>Talent</div>
      <div class="sec" onclick="toast('Nástenka — udalosti (demo)')"><span class="ic" style="color:#7E9BF0">▣</span>Nástenka</div>
      <div class="sec primary" onclick="go('add')"><span class="ic">＋</span>Pridať</div>
    </div>
    <div class="leaders">
      <div class="lead" onclick="toast('Rebríček: Top B2B partner')"><div class="sym" style="background:#13344A;color:var(--blue)">▼</div><div class="role">PARTNER</div><div class="nm">Kaufland</div></div>
      <div class="lead" onclick="toast('Rebríček: Top darca')"><div class="sym" style="background:#33290F;color:var(--gold)">♛</div><div class="role">DARCA</div><div class="nm">Lukáš H.</div></div>
      <div class="lead" onclick="toast('Rebríček: Top hrdina')"><div class="sym" style="background:#33220F;color:var(--orange)">★</div><div class="role">HRDINA</div><div class="nm">Jana N.</div></div>
      <div class="lead" onclick="toast('Fun zóna — AI omyly (demo)')"><div class="sym" style="background:#2A1F10;color:var(--gold)">☺</div><div class="role">FUN</div><div class="nm">AI omyly</div></div>
      <div class="divider-v"></div>
      <div class="friend"><div class="fc">M</div><div class="fn">Mária</div></div>
      <div class="friend"><div class="fc">P</div><div class="fn">Peter</div></div>
    </div>
    <div class="ticker"><span class="dot"></span>Dnes 312 skutkov · mesiac 9 480 · pred 1 min</div>
    <div class="radius"><span>◉ Moja štvrť · Trenčín · 2 km</span><a onclick="toast('Mapa — nastavenie rádiusu (demo)')">zmeniť</a></div>
    <div class="feed" id="feedList"></div>
  </div>

  <!-- DETAIL -->
  <div class="screen" id="detail"></div>

  <!-- ADD -->
  <div class="screen" id="add"></div>

  <!-- VERIFY -->
  <div class="screen" id="verify"></div>

  <!-- PROFILE -->
  <div class="screen" id="profile"></div>
  <div class="screen" id="wallet"></div>
  <div class="screen" id="sub"></div>
</div>

<div class="tabbar">
  <div class="tab active" data-tab="home" onclick="go('home')"><span class="ti">⌂</span>Domov</div>
  <div class="tab" onclick="toast('Modul Help (demo)')"><span class="ti">♥</span>Help</div>
  <div class="tab" onclick="toast('Modul Charita (demo)')"><span class="ti">✚</span>Charita</div>
  <div class="tab" onclick="toast('Modul Výzva (demo)')"><span class="ti">★</span>Výzva</div>
</div>

<div class="toast" id="toast"></div>
<div class="celebrate" id="celebrate" onclick="this.classList.remove('show')">
  <div class="mascot" id="mascotEmoji">🎉</div>
  <h2 id="celebTitle">Ďakujeme!</h2>
  <p id="celebText"></p>
</div>

<script>
// ---------- DATA ----------
const CAT={
  Komunita:{c:'#5BA8F0',bg:'#10233a',bg2:'#1d3f63',bd:'#2A5E8E'},
  Priroda:{c:'#3DD68C',bg:'#0f2417',bg2:'#1c4029',bd:'#2E7D52',label:'Príroda'},
  Zdravie:{c:'#3DD6CE',bg:'#0d2422',bg2:'#163f3a',bd:'#2E9E9E'},
  Ucenie:{c:'#A98BF0',bg:'#1a1430',bg2:'#2c2350',bd:'#7A5BD8',label:'Učenie'},
  Pomoc:{c:'#F2706F',bg:'#2a1414',bg2:'#451f1f',bd:'#7A3030'}
};
function catLabel(k){return CAT[k].label||k;}

const ITEMS=[
 {id:1,type:'skutok',size:'big',cat:'Komunita',media:'video',verified:true,
  author:'Dobrovoľní hasiči TN',pfp:'#3A8DD6',ini:'H',karma:'Gold',loc:'Trenčín · Sihoť',time:'2 h',num:120042,
  title:'Celú noc sme hľadali nezvestného dôchodcu — našli sme ho.',
  desc:'O 23:00 nahlásili nezvestného 78-ročného pána. Prehľadávali sme les pri Váhu do rána. Našli sme ho prechladnutého, ale živého.',
  emoji:'🚒',sum:177,likes:23,importance:'Výnimočný skutok'},

 {id:2,type:'skutok',size:'med',cat:'Priroda',media:'foto',

// ---------- RENDER FEED ----------
function heroGrad(cat){const c=CAT[cat];return `background:linear-gradient(160deg,${c.bg},${c.bg2})`;}
function feed(){
  const el=document.getElementById('feedList');
  el.innerHTML=ITEMS.map(it=>{
    if(it.size==='big') return bigCard(it);
    if(it.size==='med') return medCard(it);
    if(it.size==='req') return reqCard(it);
    return smallRow(it);
  }).join('');
}
function srcTag(it){
  if(it.source==='Help') return `<span class="chip" style="background:var(--redBg);color:var(--red)">Help · žiadosť</span>`;
  if(it.source==='Charity') return `<span class="charbadge">✓ Charita ${it.charLevel||''}</span>`;
  return `<span class="chip" style="background:${CAT[it.cat].bg};color:${CAT[it.cat].c}">${catLabel(it.cat)}</span>`;
}
function bigCard(it){const c=CAT[it.cat];return `
<div class="card big" onclick="detail(${it.id})">
  <div class="hero" style="${heroGrad(it.cat)}">
    <div class="hero-grad" style="background:radial-gradient(circle at 35% 40%,rgba(255,255,255,.06),transparent 60%)"></div>
    <div class="badge l">★ ${it.importance}</div>
    ${it.media==='video'?'<div class="badge r">▶ video</div>':''}
    <div class="play"></div>
    <div style="position:absolute;bottom:12px;left:12px">${srcTag(it)}</div>
  </div>
  <div class="body">
    <div class="row-top"><div class="pfp" style="background:${it.pfp}">${it.ini}</div><div class="name">${it.author}</div>
      ${it.verified?'<span class="verif">overené</span>':''}<span class="time">${it.time}</span></div>
    <div class="loc">${it.loc} · skutok č. ${it.num.toLocaleString('sk')}</div>
    <div class="title">${it.title}</div>
  </div>
</div>`;}
function medCard(it){const c=CAT[it.cat];const isChar=it.type==='charity';return `
<div class="card med ${isChar?'char':''}" onclick="detail(${it.id})">
  <div class="thumb" style="${heroGrad(it.cat)}">${it.media==='kreslene'?'✎':it.emoji}</div>
  <div class="mright">
    <div class="mt">${it.title}</div>
    <div class="mmeta">
      <span style="font-size:10px;color:var(--txt2)">${it.author}</span>
      ${srcTag(it)}
      ${isChar?progressMini(it):''}
    </div>
  </div>
  <span class="time">${it.time}</span>
</div>`;}
function progressMini(it){const pct=Math.round(it.raised/it.goal*100);return `
  <div style="width:100%;margin-top:6px">
    <div style="height:5px;background:#1F2731;border-radius:3px;overflow:hidden"><i style="display:block;height:100%;width:${pct}%;background:${CAT[it.cat].c}"></i></div>
    <div style="font-size:9px;color:var(--txt3);margin-top:3px">${it.raised.toLocaleString('sk')} € z ${it.goal.toLocaleString('sk')} € · ${pct}%</div>
  </div>`;}
function reqCard(it){const pct=it.goal?Math.round(it.raised/it.goal*100):0;return `
<div class="card req" onclick="detail(${it.id})">
  <div class="med" style="padding:14px">
    <div class="ricon">${it.emoji}</div>
    <div class="mright">
      <div style="display:flex;align-items:center;gap:8px"><div class="mt" style="color:var(--red)">${it.title}</div>${it.topped?'<span class="chip" style="background:var(--redBg);color:var(--red);margin-left:auto">Topované</span>':''}</div>
      <div style="font-size:10.5px;color:#D6B0B0;margin-top:6px">${it.author} · ${it.loc}</div>
      ${it.goal?`<div class="progress"><i style="width:${pct}%"></i></div><div style="font-size:9.5px;color:#C99;margin-top:4px">${it.raised.toLocaleString('sk')} € z ${it.goal.toLocaleString('sk')} € · ${it.helpers} pomohlo</div>`:`<div style="font-size:9.5px;color:#C99;margin-top:6px">${it.helpers} ľudí sa zapojilo · otvorená podpora</div>`}
    </div>
  </div>
</div>`;}
function smallRow(it){const c=CAT[it.cat];const isReq=it.type==='ziadost';const isChar=it.type==='charity';
  const col=isReq?'#F2706F':(isChar?'#5BA8F0':c.c);
  const bg=isReq?'#1c1314':(isChar?'#10233a':c.bg);
  const ic=it.media==='kreslene'?'✎':(isReq?'!':(isChar?'✓':'▦'));
  return `
<div class="srow" onclick="detail(${it.id})" ${isReq?'style="border-color:var(--redBd)"':''}>
  <div class="si" style="background:${bg};color:${col};border:1px solid ${isReq?'var(--redBd)':c.bd}">${ic}</div>
  <div class="sb">
    <div class="st"><span class="cdot" style="background:${col}"></span>${it.title}</div>
    <div class="smeta">${it.author} · ${isReq?'žiadosť':(isChar?'charita':catLabel(it.cat))}${it.karma?' · '+it.karma:''}</div>
  </div>
  <div class="sr"><div class="time">${it.time}</div><div style="color:#4A4F57;font-size:14px">›</div></div>
</div>`;}

function qrCells(){let s='';for(let i=0;i<25;i++){s+= Math.random()>0.5?'<i></i>':'<i style="background:transparent"></i>';}return s;}

function like(id){
  liked[id]=!liked[id];
  const it=ITEMS.find(x=>x.id===id);
  document.getElementById('likeBtn').classList.toggle('liked',liked[id]);
  document.getElementById('likeCount').textContent=(it.likes||0)+(liked[id]?1:0);
}
function support(id,amt,emoji){
  const it=ITEMS.find(x=>x.id===id);
  toast(`Ďakujeme za ${amt} DEED pre ${it.author}`);
  celebrate(amt,it.author);
}
function customAmount(id,channel){
  const v=prompt(`Zadaj sumu (${channel}):`,channel==='FIAT'?'5':'25');
  if(v===null)return;
  const it=ITEMS.find(x=>x.id===id);
  if(confirm(`Potvrď: poslať ${v} ${channel==='FIAT'?'€':'DEED'} pre ${it.author}?`)){
    toast(`Odoslané ${v} ${channel==='FIAT'?'€':'DEED'} · ${it.author}`);
    celebrate(parseInt(v)||10,it.author);
  }
}
function celebrate(amt,who){
  const c=document.getElementById('celebrate');
  const big=amt>=100;
  document.getElementById('mascotEmoji').textContent=big?'🎊':(amt>=50?'⭐':'😊');
  document.getElementById('celebTitle').textContent=big?'Skvelé! Veľká podpora!':'Ďakujeme!';
  document.getElementById('celebText').textContent=`Tvoja podpora ${amt} DEED letí k ${who}. Reťaz dobra pokračuje.`;
  c.classList.add('show');
  setTimeout(()=>c.classList.remove('show'),1800);
}

    ${tile('Štatistiky','umiestnenie','#0d2422','var(--teal)','▦',"subScreen('Štatistiky a umiestnenie')")}
    ${tile('Priatelia','nájdi známych','#2a1f10','var(--gold)','☺',"subScreen('Priatelia')")}
    ${tile('Nastavenia','vzhľad, jazyk','#1a1a22','#9AA0A8','⚙',"subScreen('Nastavenia')")}
  </div>`;
  go('profile');
}
function tile(t,s,bg,col,ic,act){return `<div class="tile" onclick="${act}"><div class="tic" style="background:${bg};color:${col}">${ic}</div><div class="tt">${t}</div><div class="ts">${s}</div></div>`;}

function subScreen(name){
  const el=document.getElementById('sub');
  let content='';
  if(name==='Moje skutky'){
    content=ITEMS.filter(i=>i.type==='skutok').slice(0,5).map(i=>`<div class="subitem"><span><span class="cdot" style="background:${CAT[i.cat].c}"></span>${i.title.slice(0,28)}…</span><span class="amt" style="color:var(--blue)">+${i.sum}</span></div>`).join('');
  }else if(name==='Karma a úrovne'){
    content=[['Celková karma','Gold · L7','var(--gold)'],['Komunita','Silver','#5BA8F0'],['Príroda','Gold','#3DD68C'],['Zdravie','Bronze','#3DD6CE'],['Učenie','Bronze','#A98BF0']].map(r=>`<div class="subitem"><span>${r[0]}</span><span class="amt" style="color:${r[2]}">${r[1]}</span></div>`).join('');
  }else if(name==='Nastavenia'){
    content=`<div class="subitem"><span>Vzhľad</span><span class="amt" style="color:var(--blue)" onclick="toast('Dark / Day — mení len podklad')">Dark ▾</span></div>
    <div class="subitem"><span>Jazyk</span><span class="amt">SK ▾</span></div>
    <div class="subitem"><span>Profil</span><span class="amt" style="color:var(--green)">Verejný ▾</span></div>
    <div class="subitem"><span>Notifikácie</span><span class="amt">Zapnuté ▾</span></div>`;
  }else if(name==='Priatelia'){
    content=`<button class="btn" onclick="toast('Hľadám známych cez kontakty (demo)')">Nájsť známych cez kontakty</button><div class="note">Čísla sa hashujú, GDPR súhlas, dá sa vypnúť.</div>`;
  }else{
    content=[['Celkové umiestnenie','#412 v meste','var(--gold)'],['Príroda','#28 v štvrti','#3DD68C'],['Tento mesiac','+9 skutkov','var(--blue)'],['Celkovo darované','840 €','var(--green)']].map(r=>`<div class="subitem"><span>${r[0]}</span><span class="amt" style="color:${r[2]}">${r[1]}</span></div>`).join('');
  }
  el.innerHTML=`<div class="back-bar"><div class="bk" onclick="profile()">‹</div><h3>${name}</h3></div><div class="sublist">${content}</div>`;
  go('sub');
}

// ---------- NAV ----------
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab==='home'&&id==='home'));
  if(id==='add')addWizard();
  if(id==='profile')profile();
  window.scrollTo(0,0);
}
let toastT;
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);
}
feed();
</script>
